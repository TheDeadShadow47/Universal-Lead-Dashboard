<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Admin | Management Dashboard</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS for Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-container" class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-area">✈️</div>
            <h2>Admin Login</h2>
            <p>Manage your flight consultation leads</p>
            <form id="login-form">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@flight.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="login-btn">Secure Login</button>
            </form>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- 2. DASHBOARD SCREEN -->
    <div id="dashboard-container" class="dashboard-wrapper" style="display: none;">
        <nav class="sidebar">
            <div class="sidebar-header">
                <span class="logo-icon">✈️</span>
                <span class="logo-text">FlightAdmin</span>
            </div>
            <ul class="nav-links">
                <li class="active">📋 Consultations</li>
                <li onclick="handleLogout()">🚪 Logout</li>
            </ul>
        </nav>

        <main class="content">
            <header class="top-bar">
                <div class="header-title">
                    <h1>Consultation Leads</h1>
                    <p>Submissions from your website form</p>
                </div>
                <div class="action-buttons">
                    <button id="export-excel-btn" class="btn-excel">📊 Excel Export</button>
                    <button id="export-csv-btn" class="btn-secondary">📥 CSV</button>
                </div>
            </header>

            <div class="card">
                <div id="loading-state" class="loading">
                    <div class="spinner"></div>
                    <p>Loading your leads...</p>
                </div>

                <div class="table-responsive" id="table-area" style="display: none;">
                    <table id="submissions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Client Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Message</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
